apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: sokos-pdl-mq-adapter
  namespace: okonomi
  labels:
    team: okonomi
spec:
  image: {{image}}
  port: 8080
  replicas:
    min: 1
    max: 1
    cpuThresholdPercentage: 90
  secureLogs:
    enabled: true
  kafka:
    pool: nav-prod
  gcp:
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 512Mi
  liveness:
    path: /internal/is_alive
    initialDelay: 30
    timeout: 5
    periodSeconds: 5
    failureThreshold: 30
  readiness:
    path: /internal/is_ready
    initialDelay: 60
    periodSeconds: 5
    timeout: 5
  prometheus:
    enabled: true
    path: /metrics
  accessPolicy:
    outbound:
      external:
        - host: a01apvl247.adeo.no
          ports:
            - name: mq
              port: 1414
              protocol: TCP
  ingresses:
    - https://sokos-pdl-mq-adapter.intern.nav.no
  env:
    - name: KAFKA_CONSUMER_TOPIC
      value: pdl.pdl-persondokument-v1
    - name: KAFKA_CONSUMER_GROUP_ID
      value: sokos-pdl-mq-adapter-group-id
    - name: KAFKA_CONSUMER_OFFSET_RESET
      value: latest
    - name: UR_MQ_PRODUCER_QUEUE
      value: QA.P230.OB01_PDLDATA
    - name: UR_MQ_HOST
      value: a01apvl247.adeo.no
    - name: UR_MQ_PORT
      value: "1414"
    - name: UR_MQ_QUEUE_MANAGER_NAME
      value: MPLS01
    - name: UR_MQ_CHANNEL
      value: P_SOKOS_PDL_PERSON
    - name: OS_MQ_PRODUCER_QUEUE
      value: QA.P231.OB04_PDLDATA
    - name: OS_MQ_HOST
      value: a01apvl247.adeo.no
    - name: OS_MQ_PORT
      value: "1414"
    - name: OS_MQ_QUEUE_MANAGER_NAME
      value: MPLS01
    - name: OS_MQ_CHANNEL
      value: P_SOKOS_PDL_PERSON
  envFrom:
    - secret: sokos-pdl-mq-adapter-secrets