apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: sokos-pdl-person-mq-adapter
  namespace: okonomi
  labels:
    team: okonomi
spec:
  image: {{image}}
  port: 8080
  replicas:
    min: 1
    max: 1
    cpuThresholdPercentage: 90
  secureLogs:
    enabled: true
  kafka:
    pool: nav-prod
  gcp:
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 512Mi
  liveness:
    path: /internal/is_alive
    initialDelay: 30
    timeout: 5
    periodSeconds: 5
    failureThreshold: 30
  readiness:
    path: /internal/is_ready
    initialDelay: 30
    periodSeconds: 5
    timeout: 5
  prometheus:
    enabled: true
    path: /metrics
  ingresses:
    - https://sokos-kontoregister-person-mq-adapter.intern.nav.no
  env:
    - name: KAFKA_CONSUMER_TOPIC
      value: aapen-person-pdl-dokument-v1
    - name: KAFKA_CONSUMER_GROUP_ID
      value: pdl-person-mq-adapter-group-id
#      variabler for mq
    - name: MQ_PRODUCER_QUEUE
      value: QA.P231.OB04_KONTODATA
    - name: MQ_HOST
      value: a01apvl247.adeo.no
    - name: MQ_PORT
      value: "1414"
    - name: MQ_QUEUE_MANAGER_NAME
      value: MPLS01
    - name: MQ_CHANNEL
      value: P_KRP_MQ_ADAPTER
  envFrom:
    - secret: sokos-kontoregister-person-mq-adapter-secrets