name: Deploy alerts
on:
  push:
    branches:
      - master
      - -dev
    paths:
      - '.github/workflows/alerts.yaml'
      - '.nais/alerterator-dev.yaml'
      - '.nais/alerterator-prod.yaml'
jobs:
  apply-alerts-dev:
    name: Apply alerts to dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: deploy to dev
        uses: nais/deploy/actions/deploy@v1
        env:
          APIKEY: ${{ secrets.NAIS_DEPLOY_APIKEY }}
          CLUSTER: dev-fss
          RESOURCE: .nais/alerterator-dev.yaml

  apply-alerts-prod:
    name: Apply alerts to prod
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: deploy to prod
        uses: nais/deploy/actions/deploy@v1
        env:
          APIKEY: ${{ secrets.NAIS_DEPLOY_APIKEY }}
          CLUSTER: prod-gcp
          RESOURCE: .nais/alerterator-prod.yaml
